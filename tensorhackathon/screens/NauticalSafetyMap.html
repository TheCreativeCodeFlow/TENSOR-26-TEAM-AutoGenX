<!DOCTYPE html>

<html class="light" lang="ta"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Kadal Kavalan - Nautical Map</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;700;900&amp;family=Public+Sans:wght@400;500;600&amp;family=Noto+Sans:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "error": "#ba1a1a",
                    "surface-container-low": "#f6f3f2",
                    "on-primary-fixed": "#001e2d",
                    "on-primary": "#ffffff",
                    "surface-variant": "#e5e2e1",
                    "on-primary-container": "#8ac0e1",
                    "primary-container": "#0b4f6c",
                    "surface": "#fcf9f8",
                    "tertiary-fixed-dim": "#f6adff",
                    "secondary-fixed": "#b1f0ce",
                    "on-secondary-fixed-variant": "#0e5138",
                    "on-tertiary-fixed-variant": "#712281",
                    "inverse-surface": "#313030",
                    "surface-container-highest": "#e5e2e1",
                    "secondary": "#2c694e",
                    "on-surface-variant": "#41484d",
                    "secondary-container": "#aeeecb",
                    "outline": "#71787e",
                    "on-tertiary-container": "#f199fe",
                    "outline-variant": "#c0c7ce",
                    "surface-dim": "#dcd9d9",
                    "surface-container-high": "#eae7e7",
                    "on-secondary": "#ffffff",
                    "secondary-fixed-dim": "#95d4b3",
                    "primary-fixed": "#c5e7ff",
                    "inverse-primary": "#97cdef",
                    "primary": "#00374e",
                    "on-surface": "#1c1b1b",
                    "on-primary-fixed-variant": "#054c69",
                    "on-error": "#ffffff",
                    "background": "#fcf9f8",
                    "error-container": "#ffdad6",
                    "tertiary": "#5a046b",
                    "primary-fixed-dim": "#97cdef",
                    "surface-bright": "#fcf9f8",
                    "on-error-container": "#93000a",
                    "tertiary-container": "#742684",
                    "on-background": "#1c1b1b",
                    "on-secondary-fixed": "#002114",
                    "surface-tint": "#2a6482",
                    "tertiary-fixed": "#fed6ff",
                    "inverse-on-surface": "#f3f0ef",
                    "on-secondary-container": "#316e52",
                    "surface-container": "#f0eded",
                    "on-tertiary": "#ffffff",
                    "on-tertiary-fixed": "#350041",
                    "surface-container-lowest": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Work Sans"],
                    "body": ["Public Sans"],
                    "label": ["Public Sans"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Public Sans', sans-serif; }
        .map-gradient-overlay {
            background: radial-gradient(circle at center, transparent 0%, rgba(0, 55, 78, 0.05) 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen overflow-hidden flex flex-col">
<!-- TopAppBar -->
<header class="bg-[#fcf9f8] dark:bg-slate-950 docked full-width top-0 z-50">
<div class="flex justify-between items-center w-full px-6 py-4 max-w-screen-xl mx-auto">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#00374e] dark:text-sky-400 text-3xl" data-icon="anchor">anchor</span>
<h1 class="font-['Work_Sans'] font-bold tracking-tighter text-2xl uppercase text-[#00374e] dark:text-sky-400">KADAL KAVALAN</h1>
</div>
<button class="transition-all duration-300 ease-in-out active:scale-95 hover:bg-slate-200/50 dark:hover:bg-slate-800/50 px-4 py-2 rounded-xl text-[#00374e] dark:text-sky-400 font-medium">
                Translate
            </button>
</div>
</header>
<!-- Map Canvas (Main Content) -->
<main class="flex-grow relative w-full h-full overflow-hidden bg-surface-dim">
<!-- Mock Map Background -->
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover grayscale-[20%] contrast-[110%]" data-alt="top-down nautical chart of a coastline with deep blue water, lighter turquoise shallows, and coastal geography details" data-location="Bay of Bengal" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBTQRNRXZu443UNA1hGYnTBYtJUp-zCYiDMfo5Fbr0H2JVXzhUHb4YXxcyuZEHvL009GD9O71x7E-8Dcc6084vuycxd-E2h3RugoRlRA4g9fEm2pFWY04Eut8VZYjp288rhqcnb4FwKVZ6-WpX7SVai9GzOpn0x2AQ_Tqwv4A3xZ0sVjJp-NP81RFyeI2a_jiffoIKqG74sUoL2Q5zKnSlZn-cNgfziVMckZdxYXyiPHIALsuSVCK5WlEQBjPvyokBf4cYcLGbW9QBZ"/>
<div class="absolute inset-0 map-gradient-overlay pointer-events-none"></div>
<!-- Fake Fishing Zones Polygons (SVG Overlay) -->
<svg class="absolute inset-0 w-full h-full opacity-40 pointer-events-none">
<!-- Safe Zone - Green -->
<path d="M100,200 L400,150 L350,450 L120,400 Z" fill="#aeeecb" stroke="#2c694e" stroke-width="2"></path>
<!-- Warning Zone - Amber -->
<path d="M450,100 L700,200 L650,400 L420,350 Z" fill="#fed6ff" stroke="#712281" stroke-width="2"></path>
<!-- Danger Zone - Red -->
<path d="M50,500 L300,550 L250,750 L80,700 Z" fill="#ffdad6" stroke="#ba1a1a" stroke-width="2"></path>
<!-- User Location Pulse -->
<circle cx="200" cy="350" fill="#00374e" r="8"></circle>
<circle cx="200" cy="350" fill="#00374e" opacity="0.2" r="20"></circle>
</svg>
</div>
<!-- Floating Controls -->
<div class="absolute top-6 right-6 flex flex-col gap-4 z-20">
<button class="w-12 h-12 rounded-xl bg-surface-container-lowest shadow-lg flex items-center justify-center text-primary active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="layers">layers</span>
</button>
<button class="w-12 h-12 rounded-xl bg-surface-container-lowest shadow-lg flex items-center justify-center text-primary active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="my_location" style="font-variation-settings: 'FILL' 1;">my_location</span>
</button>
<button class="w-12 h-12 rounded-xl bg-[#25D366] text-white shadow-lg flex items-center justify-center active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="share">share</span>
</button>
</div>
<!-- Search / Coordinate Bar -->
<div class="absolute top-6 left-6 right-20 md:right-auto md:w-96 z-20">
<div class="bg-surface-container-lowest/90 backdrop-blur-md rounded-2xl p-4 shadow-lg flex items-center gap-3">
<span class="material-symbols-outlined text-outline" data-icon="search">search</span>
<div class="flex-grow">
<div class="text-[10px] uppercase tracking-widest text-on-surface-variant font-bold">Coordinates</div>
<div class="font-headline font-bold text-primary">13.0827° N, 80.2707° E</div>
</div>
</div>
</div>
<!-- Bottom Sheet (Information Panel) -->
<div class="absolute bottom-24 left-4 right-4 z-30 md:max-w-md md:left-6">
<div class="bg-surface-container-lowest rounded-3xl p-6 shadow-[0_-8px_32px_rgba(0,0,0,0.08)]">
<!-- Drag Handle -->
<div class="w-12 h-1.5 bg-outline-variant/30 rounded-full mx-auto mb-6"></div>
<div class="flex justify-between items-start mb-6">
<div>
<h2 class="font-headline text-2xl font-black text-primary leading-tight">Pulicat Basin Delta</h2>
<p class="text-on-surface-variant text-sm mt-1">Updated 4 mins ago</p>
</div>
<span class="bg-error-container text-on-error-container px-3 py-1 rounded-full text-xs font-bold tracking-wider">DANGER</span>
</div>
<div class="grid grid-cols-2 gap-4">
<!-- Metric 1 -->
<div class="bg-surface-container-low rounded-2xl p-4 border border-outline-variant/10">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-primary text-xl" data-icon="waves">waves</span>
<span class="text-xs font-bold uppercase text-on-surface-variant">Wave Height</span>
</div>
<div class="font-headline text-3xl font-black text-primary">4.2<span class="text-lg font-medium ml-1 text-on-surface-variant">m</span></div>
</div>
<!-- Metric 2 -->
<div class="bg-surface-container-low rounded-2xl p-4 border border-outline-variant/10">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-primary text-xl" data-icon="air">air</span>
<span class="text-xs font-bold uppercase text-on-surface-variant">Wind Speed</span>
</div>
<div class="font-headline text-3xl font-black text-primary">32<span class="text-lg font-medium ml-1 text-on-surface-variant">kts</span></div>
</div>
</div>
<button class="w-full mt-6 bg-gradient-to-br from-primary to-primary-container text-white py-4 rounded-xl font-bold flex items-center justify-center gap-2 transition-all active:scale-[0.98]">
<span class="material-symbols-outlined" data-icon="emergency_share">emergency_share</span>
                    Broadcast SOS to Port
                </button>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="bg-[#fcf9f8]/60 dark:bg-slate-950/60 backdrop-blur-xl fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 shadow-[0_-8px_32px_rgba(0,0,0,0.06)] rounded-t-2xl border-t border-white/10">
<!-- Home -->
<a class="flex flex-col items-center justify-center text-[#41484d] dark:text-slate-400 p-2 hover:bg-[#0b4f6c]/10 dark:hover:bg-sky-400/10 transition-transform active:scale-90" href="#">
<span class="material-symbols-outlined mb-1" data-icon="home">home</span>
<span class="font-['Noto_Sans'] text-[10px] font-bold">முகப்பு</span>
</a>
<!-- Map (ACTIVE) -->
<a class="flex flex-col items-center justify-center bg-[#00374e] dark:bg-sky-500 text-white dark:text-slate-950 rounded-xl px-5 py-2 active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined mb-1" data-icon="map" style="font-variation-settings: 'FILL' 1;">map</span>
<span class="font-['Noto_Sans'] text-[10px] font-bold">வரைபடம்</span>
</a>
<!-- Notifications -->
<a class="flex flex-col items-center justify-center text-[#41484d] dark:text-slate-400 p-2 hover:bg-[#0b4f6c]/10 dark:hover:bg-sky-400/10 transition-transform active:scale-90" href="#">
<span class="material-symbols-outlined mb-1" data-icon="notifications_active">notifications_active</span>
<span class="font-['Noto_Sans'] text-[10px] font-bold">எச்சரிக்கை</span>
</a>
<!-- Settings -->
<a class="flex flex-col items-center justify-center text-[#41484d] dark:text-slate-400 p-2 hover:bg-[#0b4f6c]/10 dark:hover:bg-sky-400/10 transition-transform active:scale-90" href="#">
<span class="material-symbols-outlined mb-1" data-icon="settings">settings</span>
<span class="font-['Noto_Sans'] text-[10px] font-bold">அமைப்புகள்</span>
</a>
</nav>
<!-- FAB Suppression Logic: Not rendering on this screen per instructions if task-focused, 
         but here the floating controls serve as the primary contextual action elements. -->
</body></html>
